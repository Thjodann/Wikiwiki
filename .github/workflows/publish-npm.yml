name: Publish npm

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Update npm
        run: npm install -g npm@latest

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Validate
        run: npm run check

      - name: Read package version
        id: package
        run: |
          version="$(node -p "require('./package.json').version")"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check published version
        id: published
        run: |
          if npm view "@thjodann/wk@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip existing version
        if: steps.published.outputs.exists == 'true'
        run: echo "@thjodann/wk@${{ steps.package.outputs.version }} is already published; skipping npm publish."

      - name: Publish
        if: steps.published.outputs.exists != 'true'
        run: npm publish --provenance --access public
